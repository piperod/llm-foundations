<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Stage 1: raw text -->
  <rect x="20" y="150" width="130" height="60" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="85" y="185" font-size="14" fill="#1f2937" text-anchor="middle">"unbelievable"</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="180" x2="200" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: subword tokens -->
  <rect x="205" y="150" width="220" height="60" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <rect x="213" y="163" width="62" height="34" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="244" y="185" font-size="14" fill="#1f2937" text-anchor="middle">un</text>
  <rect x="281" y="163" width="76" height="34" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="319" y="185" font-size="14" fill="#1f2937" text-anchor="middle">believ</text>
  <rect x="363" y="163" width="58" height="34" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="392" y="185" font-size="14" fill="#1f2937" text-anchor="middle">able</text>

  <!-- Arrow 2 -->
  <line x1="425" y1="180" x2="475" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: token IDs -->
  <rect x="480" y="163" width="62" height="34" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="511" y="185" font-size="14" fill="#1f2937" text-anchor="middle">403</text>
  <rect x="548" y="163" width="62" height="34" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="579" y="185" font-size="14" fill="#1f2937" text-anchor="middle">8821</text>
  <rect x="616" y="163" width="62" height="34" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="647" y="185" font-size="14" fill="#1f2937" text-anchor="middle">227</text>

  <!-- Arrow 3 -->
  <line x1="678" y1="180" x2="712" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: embedding vector glyphs -->
  <!-- Vector 1 (under 403) -->
  <g>
    <rect x="500" y="240" width="16" height="14" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="500" y="256" width="16" height="24" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="500" y="282" width="16" height="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="500" y="294" width="16" height="20" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="500" y="316" width="16" height="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  </g>
  <!-- Vector 2 (under 8821) -->
  <g>
    <rect x="568" y="248" width="16" height="20" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="568" y="270" width="16" height="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="568" y="282" width="16" height="26" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="568" y="310" width="16" height="14" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="568" y="326" width="16" height="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  </g>
  <!-- Vector 3 (under 227) -->
  <g>
    <rect x="636" y="252" width="16" height="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="636" y="264" width="16" height="28" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="636" y="294" width="16" height="16" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="636" y="312" width="16" height="10" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
    <rect x="636" y="324" width="16" height="18" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  </g>

  <!-- Stage labels along bottom -->
  <text x="85" y="230" font-size="14" fill="#1f2937" text-anchor="middle">text</text>
  <text x="315" y="230" font-size="14" fill="#1f2937" text-anchor="middle">subword tokens</text>
  <text x="579" y="230" font-size="14" fill="#1f2937" text-anchor="middle">token IDs</text>
  <text x="579" y="360" font-size="14" fill="#1f2937" text-anchor="middle">embedding vectors</text>

  <!-- Annotation -->
  <text x="315" y="130" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">"un" + "believ" + "able"</text>
  <text x="579" y="130" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">vocabulary lookup</text>
</svg>
