<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Axes (L-shape) -->
  <line x1="90" y1="40" x2="90" y2="330" stroke="#64748b" stroke-width="1.5"/>
  <line x1="90" y1="330" x2="740" y2="330" stroke="#64748b" stroke-width="1.5"/>

  <!-- Small unlabeled tick marks on y-axis -->
  <line x1="85" y1="100" x2="95" y2="100" stroke="#64748b" stroke-width="1.5"/>
  <line x1="85" y1="170" x2="95" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="85" y1="240" x2="95" y2="240" stroke="#64748b" stroke-width="1.5"/>

  <!-- Small unlabeled tick marks on x-axis -->
  <line x1="240" y1="325" x2="240" y2="335" stroke="#64748b" stroke-width="1.5"/>
  <line x1="400" y1="325" x2="400" y2="335" stroke="#64748b" stroke-width="1.5"/>
  <line x1="570" y1="325" x2="570" y2="335" stroke="#64748b" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="415" y="368" font-size="14" fill="#1f2937" text-anchor="middle">Compute (log scale) &#8594;</text>
  <text x="0" y="0" font-size="14" fill="#1f2937" text-anchor="middle" transform="translate(35,185) rotate(-90)">&#8593; Training loss (log scale)</text>

  <!-- Power-law style curve: steep drop early, flattening later, never fully flat -->
  <path d="M 110 65
           C 160 100, 190 160, 230 205
           C 270 245, 320 265, 380 280
           C 450 297, 540 305, 620 311
           C 670 314, 700 316, 725 318"
        fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Curve label -->
  <text x="430" y="240" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">test loss vs. compute (illustrative trend)</text>

  <!-- Corner annotation -->
  <text x="730" y="390" font-size="12" font-style="italic" fill="#64748b" text-anchor="end">Schematic — not measured data. See Kaplan et al. 2020 / Hoffmann et al. 2022 for actual curves.</text>
</svg>
