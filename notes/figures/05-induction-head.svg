<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">How an Induction Head Completes a Pattern</text>

  <!-- Token sequence boxes -->
  <!-- 6 boxes, width 80, gap 20, total width 6*80+5*20=580, start x = (800-580)/2 = 110 -->
  <g font-size="14" fill="#1f2937">
    <!-- [A] first occurrence -->
    <rect x="110" y="260" width="80" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
    <text x="150" y="295" text-anchor="middle">[A]</text>

    <!-- [B] -->
    <rect x="210" y="260" width="80" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
    <text x="250" y="295" text-anchor="middle">[B]</text>

    <!-- [C] -->
    <rect x="310" y="260" width="80" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
    <text x="350" y="295" text-anchor="middle">[C]</text>

    <!-- [D] -->
    <rect x="410" y="260" width="80" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
    <text x="450" y="295" text-anchor="middle">[D]</text>

    <!-- [A] second occurrence -->
    <rect x="510" y="260" width="80" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
    <text x="550" y="295" text-anchor="middle">[A]</text>

    <!-- [?] prediction, secondary/contrast style -->
    <rect x="610" y="260" width="80" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="650" y="295" text-anchor="middle">[?]</text>
  </g>

  <!-- Dashed curved arrow: first [A] (150,260) up and over to [B] (250,260), labeled "1. find earlier match of the current token" -->
  <path d="M 150 260 C 150 150, 250 150, 250 260" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrow)"/>
  <text x="200" y="130" text-anchor="middle" font-size="12" font-style="italic" fill="#1f2937">1. find earlier match of the current token</text>

  <!-- Solid curved arrow: [B] (250,260) down and over to [?] (650,260), labeled "2. predict that it repeats: B" -->
  <path d="M 250 260 C 250 370, 650 370, 650 260" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="395" text-anchor="middle" font-size="12" font-style="italic" fill="#1f2937">2. predict that it repeats: B</text>

  <!-- annotation under the sequence -->
  <text x="400" y="345" text-anchor="middle" font-size="12" font-style="italic" fill="#1f2937">token sequence: A, B, C, D, A, ? &#8594; model predicts B</text>
</svg>
