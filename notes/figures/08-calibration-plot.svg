<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <!-- Axes -->
  <line x1="120" y1="360" x2="120" y2="40" stroke="#64748b" stroke-width="1.5" />
  <line x1="120" y1="360" x2="620" y2="360" stroke="#64748b" stroke-width="1.5" />

  <!-- Axis ticks: 0/50/100% style -->
  <line x1="112" y1="360" x2="120" y2="360" stroke="#64748b" stroke-width="1.5" />
  <line x1="112" y1="200" x2="120" y2="200" stroke="#64748b" stroke-width="1.5" />
  <line x1="112" y1="40" x2="120" y2="40" stroke="#64748b" stroke-width="1.5" />
  <text x="104" y="364" font-size="12" fill="#1f2937" text-anchor="end">0%</text>
  <text x="104" y="204" font-size="12" fill="#1f2937" text-anchor="end">50%</text>
  <text x="104" y="44" font-size="12" fill="#1f2937" text-anchor="end">100%</text>

  <line x1="120" y1="360" x2="120" y2="368" stroke="#64748b" stroke-width="1.5" />
  <line x1="370" y1="360" x2="370" y2="368" stroke="#64748b" stroke-width="1.5" />
  <line x1="620" y1="360" x2="620" y2="368" stroke="#64748b" stroke-width="1.5" />
  <text x="120" y="384" font-size="12" fill="#1f2937" text-anchor="middle">0%</text>
  <text x="370" y="384" font-size="12" fill="#1f2937" text-anchor="middle">50%</text>
  <text x="620" y="384" font-size="12" fill="#1f2937" text-anchor="middle">100%</text>

  <!-- Axis titles -->
  <text x="370" y="412" font-size="14" fill="#1f2937" text-anchor="middle">Stated confidence &#8594;</text>
  <text x="40" y="200" font-size="14" fill="#1f2937" text-anchor="middle" transform="rotate(-90 40 200)">&#8593; Actual accuracy</text>

  <!-- Perfect calibration diagonal -->
  <line x1="120" y1="360" x2="620" y2="40" stroke="#d97706" stroke-width="2" stroke-dasharray="8,6" />
  <text x="470" y="90" font-size="12" font-style="italic" fill="#d97706" text-anchor="middle">perfect calibration (confidence = accuracy)</text>

  <!-- Typical model behavior curve: below diagonal, overconfident -->
  <path d="M 120 360 C 250 345, 320 300, 400 250 C 470 208, 540 160, 620 120"
        fill="none" stroke="#2563eb" stroke-width="2.5" />
  <text x="330" y="298" font-size="12" font-style="italic" fill="#2563eb" text-anchor="middle">typical model behavior (schematic) &#8212; overconfident</text>

  <!-- Corner annotation -->
  <text x="610" y="400" font-size="12" font-style="italic" fill="#6b7280" text-anchor="end">Schematic illustration of miscalibration, not measured data.</text>
</svg>
