<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Top box: Plan -->
  <rect x="290" y="40" width="220" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="75" font-size="14" fill="#1f2937" text-anchor="middle">Plan (decide next step)</text>

  <!-- Right box: Act -->
  <rect x="490" y="220" width="220" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="255" font-size="14" fill="#1f2937" text-anchor="middle">Act (tool call)</text>

  <!-- Bottom box: Observe -->
  <rect x="290" y="400" width="220" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="435" font-size="14" fill="#1f2937" text-anchor="middle">Observe (result)</text>

  <!-- Left box: Update context -->
  <rect x="90" y="220" width="220" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="255" font-size="14" fill="#1f2937" text-anchor="middle">Update context</text>

  <!-- Arrow: Plan -> Act (clockwise, curved) -->
  <path d="M 480 90 C 560 130, 590 170, 596 218"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Act -> Observe (clockwise, curved) -->
  <path d="M 596 282 C 590 330, 560 370, 480 400"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Observe -> Update context (clockwise, curved) -->
  <path d="M 320 400 C 240 370, 210 330, 204 282"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Update context -> Plan (clockwise, curved), completing the circle -->
  <path d="M 204 218 C 210 170, 240 130, 320 90"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Callout box (secondary style) near Update context -->
  <rect x="30" y="360" width="230" height="110" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="145" y="384" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">context grows every cycle</text>
  <text x="145" y="404" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">→ risk of error compounding,</text>
  <text x="145" y="424" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">context rot, drift</text>

  <!-- Arrow from callout to Update context box -->
  <path d="M 165 360 C 175 340, 180 320, 185 282"
        fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
