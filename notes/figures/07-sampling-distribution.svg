<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">

  <!-- Title -->
  <text x="400" y="28" font-size="14" fill="#1f2937" text-anchor="middle">Sampling a next token</text>

  <!-- Axes -->
  <line x1="70" y1="40" x2="70" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="760" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <text x="20" y="0" font-size="14" fill="#1f2937" text-anchor="middle" transform="translate(30,175) rotate(-90)">P(token)</text>

  <!-- Bars: baseline y=300, scale 400px per 1.0 probability -->
  <!-- x centers spaced evenly across 7 slots between x=70 and x=760 -->
  <!-- slot width ~ 98.6, bar width 60 -->

  <!-- Bar 1: mat, p=0.35 -->
  <rect x="90" y="160" width="60" height="140" fill="#2563eb"/>
  <text x="120" y="152" font-size="14" fill="#1f2937" text-anchor="middle">mat</text>
  <text x="120" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.35</text>

  <!-- Bar 2: rug, p=0.22 -->
  <rect x="188" y="212" width="60" height="88" fill="#2563eb"/>
  <text x="218" y="204" font-size="14" fill="#1f2937" text-anchor="middle">rug</text>
  <text x="218" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.22</text>

  <!-- Bar 3: floor, p=0.15 -->
  <rect x="286" y="240" width="60" height="60" fill="#2563eb"/>
  <text x="316" y="232" font-size="14" fill="#1f2937" text-anchor="middle">floor</text>
  <text x="316" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.15</text>

  <!-- Bar 4: roof, p=0.10 -->
  <rect x="384" y="260" width="60" height="40" fill="#2563eb"/>
  <text x="414" y="252" font-size="14" fill="#1f2937" text-anchor="middle">roof</text>
  <text x="414" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.10</text>

  <!-- Bar 5: chair, p=0.08 -->
  <rect x="482" y="268" width="60" height="32" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="512" y="260" font-size="14" fill="#1f2937" text-anchor="middle">chair</text>
  <text x="512" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.08</text>

  <!-- Bar 6: moon, p=0.06 -->
  <rect x="580" y="276" width="60" height="24" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="610" y="268" font-size="14" fill="#1f2937" text-anchor="middle">moon</text>
  <text x="610" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.06</text>

  <!-- Bar 7: banana, p=0.04 -->
  <rect x="678" y="284" width="60" height="16" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="708" y="276" font-size="14" fill="#1f2937" text-anchor="middle">banana</text>
  <text x="708" y="316" font-size="12" fill="#1f2937" text-anchor="middle">0.04</text>

  <!-- Cutoff line between bar 4 (roof) and bar 5 (chair) -->
  <line x1="463" y1="55" x2="463" y2="300" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="463" y="46" font-size="12" font-style="italic" fill="#d97706" text-anchor="middle">top-p / top-k cutoff &#8212; tail is excluded before sampling</text>

  <!-- Bottom annotation -->
  <text x="400" y="345" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">temperature reshapes these bar heights before the cutoff is applied &#8212;</text>
  <text x="400" y="362" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">higher temperature flattens them, lower temperature sharpens them.</text>

</svg>
