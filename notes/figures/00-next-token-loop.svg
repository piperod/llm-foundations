<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="24" font-size="15" font-weight="600" fill="#1f2937" text-anchor="middle">The next-token loop</text>

  <!-- Box 1: Context so far (neutral/process style) -->
  <rect x="20" y="60" width="150" height="80" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <text x="95" y="88" font-size="12" fill="#1f2937" text-anchor="middle" font-weight="600">Context so far</text>
  <text x="95" y="108" font-size="12" fill="#1f2937" text-anchor="middle" font-style="italic">"The cat sat</text>
  <text x="95" y="124" font-size="12" fill="#1f2937" text-anchor="middle" font-style="italic">on the"</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="212" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Model computes distribution (primary style) -->
  <rect x="215" y="55" width="185" height="90" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="307" y="82" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="600">Model computes a</text>
  <text x="307" y="100" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="600">probability distribution</text>
  <text x="307" y="118" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="600">over the next token</text>

  <!-- Arrow down to bar chart -->
  <line x1="307" y1="145" x2="307" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bar chart centerpiece -->
  <g>
    <rect x="215" y="178" width="290" height="150" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="230" y="196" font-size="12" font-style="italic" fill="#1f2937">Candidate next tokens</text>

    <!-- mat: 0.42 -->
    <text x="230" y="214" font-size="12" fill="#1f2937">"mat"</text>
    <rect x="275" y="204" width="176" height="14" fill="#2563eb"/>
    <text x="457" y="214" font-size="12" fill="#1f2937">0.42</text>

    <!-- rug: 0.31 -->
    <text x="230" y="236" font-size="12" fill="#1f2937">"rug"</text>
    <rect x="275" y="226" width="130" height="14" fill="#2563eb" opacity="0.8"/>
    <text x="412" y="236" font-size="12" fill="#1f2937">0.31</text>

    <!-- floor: 0.20 -->
    <text x="230" y="258" font-size="12" fill="#1f2937">"floor"</text>
    <rect x="275" y="248" width="84" height="14" fill="#2563eb" opacity="0.6"/>
    <text x="366" y="258" font-size="12" fill="#1f2937">0.20</text>

    <!-- roof: 0.06 -->
    <text x="230" y="280" font-size="12" fill="#1f2937">"roof"</text>
    <rect x="275" y="270" width="25" height="14" fill="#2563eb" opacity="0.4"/>
    <text x="307" y="280" font-size="12" fill="#1f2937">0.06</text>

    <!-- moon: 0.01 -->
    <text x="230" y="302" font-size="12" fill="#1f2937">"moon"</text>
    <rect x="275" y="292" width="4" height="14" fill="#2563eb" opacity="0.3"/>
    <text x="286" y="302" font-size="12" fill="#1f2937">0.01</text>

    <text x="230" y="320" font-size="12" font-style="italic" fill="#1f2937">bars ∝ probability</text>
  </g>

  <!-- Arrow from mat bar to sampled token box -->
  <line x1="505" y1="211" x2="560" y2="211" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box: Sampled token (secondary/contrast style) -->
  <rect x="563" y="176" width="200" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="663" y="204" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="600">Sampled token:</text>
  <text x="663" y="224" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="600">"mat"</text>

  <!-- Curved feedback arrow looping back to context box -->
  <path d="M 620 246 C 620 340, 95 340, 95 142" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="357" y="362" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">append + repeat</text>

</svg>
