<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- 1. User query -->
  <rect x="20" y="150" width="120" height="60" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <text x="80" y="185" font-size="14" fill="#1f2937" text-anchor="middle">User query</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="140" y1="180" x2="205" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Retriever box -->
  <rect x="210" y="140" width="160" height="80" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="172" font-size="14" fill="#1f2937" text-anchor="middle">Retriever searches a</text>
  <text x="290" y="190" font-size="14" fill="#1f2937" text-anchor="middle">document/tool store</text>

  <!-- 3. Stack of 3 overlapping thin rectangles representing the store, below box 2 -->
  <rect x="248" y="256" width="110" height="18" rx="4" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <rect x="258" y="266" width="110" height="18" rx="4" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <rect x="268" y="276" width="110" height="18" rx="4" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <text x="323" y="315" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">documents / tools</text>

  <!-- small connector from retriever box down to the stack -->
  <line x1="290" y1="220" x2="290" y2="253" stroke="#475569" stroke-width="1.5"/>

  <!-- Arrow 2 -> 4 -->
  <line x1="370" y1="180" x2="435" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Retrieved passages / tool results -->
  <rect x="440" y="140" width="160" height="80" rx="6" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5"/>
  <text x="520" y="172" font-size="14" fill="#1f2937" text-anchor="middle">Retrieved passages /</text>
  <text x="520" y="190" font-size="14" fill="#1f2937" text-anchor="middle">tool results</text>

  <!-- Arrow 4 -> 5 -->
  <line x1="600" y1="180" x2="625" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Generator (LLM) -->
  <rect x="630" y="140" width="150" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="705" y="172" font-size="14" fill="#1f2937" text-anchor="middle">Generator (LLM) reads</text>
  <text x="705" y="190" font-size="14" fill="#1f2937" text-anchor="middle">query + results</text>

  <!-- Arrow 5 -> Answer (down and to final box) -->
  <line x1="705" y1="220" x2="705" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. Answer -->
  <rect x="630" y="335" width="150" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="705" y="370" font-size="14" fill="#1f2937" text-anchor="middle">Answer</text>

  <!-- Dashed feedback loop from Generator back to Retriever -->
  <path d="M 630 165 C 500 90, 400 90, 290 135"
        fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrow)"/>
  <text x="460" y="80" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">may call again (ReAct-style:</text>
  <text x="460" y="96" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">thought &#8594; action &#8594; observation, repeat)</text>
</svg>
