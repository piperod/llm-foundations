<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Box 1: Input embeddings + positional encoding (neutral) -->
  <rect x="220" y="20" width="300" height="46" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="370" y="48" font-size="14" fill="#1f2937" text-anchor="middle">Input embeddings + positional encoding</text>

  <!-- Arrow 1 -->
  <line x1="370" y1="66" x2="370" y2="94" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Multi-Head Self-Attention (primary) -->
  <rect x="220" y="96" width="300" height="46" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="370" y="124" font-size="14" fill="#1f2937" text-anchor="middle">Multi-Head Self-Attention</text>

  <!-- Attention-weight matrix inset, to the left of box 2 -->
  <text x="95" y="98" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle">attention weights</text>
  <g>
    <!-- 4x4 grid of colored cells with varying opacity, illustrative -->
    <rect x="60" y="104" width="18" height="18" fill="#2563eb" opacity="0.85"/>
    <rect x="78" y="104" width="18" height="18" fill="#2563eb" opacity="0.35"/>
    <rect x="96" y="104" width="18" height="18" fill="#2563eb" opacity="0.55"/>
    <rect x="114" y="104" width="18" height="18" fill="#2563eb" opacity="0.15"/>

    <rect x="60" y="122" width="18" height="18" fill="#2563eb" opacity="0.25"/>
    <rect x="78" y="122" width="18" height="18" fill="#2563eb" opacity="0.9"/>
    <rect x="96" y="122" width="18" height="18" fill="#2563eb" opacity="0.4"/>
    <rect x="114" y="122" width="18" height="18" fill="#2563eb" opacity="0.2"/>

    <rect x="60" y="140" width="18" height="18" fill="#2563eb" opacity="0.5"/>
    <rect x="78" y="140" width="18" height="18" fill="#2563eb" opacity="0.3"/>
    <rect x="96" y="140" width="18" height="18" fill="#2563eb" opacity="0.75"/>
    <rect x="114" y="140" width="18" height="18" fill="#2563eb" opacity="0.45"/>

    <rect x="60" y="158" width="18" height="18" fill="#2563eb" opacity="0.1"/>
    <rect x="78" y="158" width="18" height="18" fill="#2563eb" opacity="0.6"/>
    <rect x="96" y="158" width="18" height="18" fill="#2563eb" opacity="0.35"/>
    <rect x="114" y="158" width="18" height="18" fill="#2563eb" opacity="0.8"/>

    <rect x="60" y="104" width="72" height="72" fill="none" stroke="#64748b" stroke-width="1"/>
  </g>

  <!-- Arrow 2 -->
  <line x1="370" y1="142" x2="370" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: Add & Norm (neutral) -->
  <rect x="220" y="172" width="300" height="46" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="370" y="200" font-size="14" fill="#1f2937" text-anchor="middle">Add &amp; Norm</text>

  <!-- Arrow 3 -->
  <line x1="370" y1="218" x2="370" y2="246" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: Feed-Forward Network (primary) -->
  <rect x="220" y="248" width="300" height="46" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="370" y="276" font-size="14" fill="#1f2937" text-anchor="middle">Feed-Forward Network</text>

  <!-- Arrow 4 -->
  <line x1="370" y1="294" x2="370" y2="322" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: Add & Norm (neutral) -->
  <rect x="220" y="324" width="300" height="46" fill="#f3f4f6" stroke="#64748b" stroke-width="1.5" rx="6"/>
  <text x="370" y="352" font-size="14" fill="#1f2937" text-anchor="middle">Add &amp; Norm</text>

  <!-- Arrow 5 -->
  <line x1="370" y1="370" x2="370" y2="398" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 6: Output -> next block (secondary/contrast) -->
  <rect x="220" y="400" width="300" height="46" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="6"/>
  <text x="370" y="428" font-size="14" fill="#1f2937" text-anchor="middle">Output → next block</text>

  <!-- Dashed bracket rectangle around boxes 2-5 (repeatable core) -->
  <rect x="200" y="88" width="340" height="290" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6,5" rx="10"/>

  <!-- Annotation label to the right -->
  <text x="558" y="228" font-size="12" font-style="italic" fill="#1f2937" text-anchor="start">repeated</text>
  <text x="558" y="244" font-size="12" font-style="italic" fill="#1f2937" text-anchor="start">× N layers</text>
</svg>
