<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="90" y1="320" x2="90" y2="60" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="90" y1="320" x2="740" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Y axis label -->
  <text x="70" y="70" font-size="14" fill="#1f2937" text-anchor="start">&#8593; Retrieval accuracy</text>

  <!-- X axis label -->
  <text x="415" y="355" font-size="14" fill="#1f2937" text-anchor="middle">Position of the relevant fact in context (beginning &#8594; middle &#8594; end)</text>

  <!-- U-shaped curve -->
  <path d="M 120 110 C 260 260, 340 290, 415 290 C 490 290, 570 260, 710 110"
        fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Annotation near the dip -->
  <text x="415" y="325" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle" dy="-6">
    facts buried in the middle
  </text>
  <text x="415" y="325" font-size="12" font-style="italic" fill="#1f2937" text-anchor="middle" dy="10">
    are recalled less reliably
  </text>

  <!-- Corner annotation -->
  <text x="730" y="45" font-size="12" font-style="italic" fill="#64748b" text-anchor="end">
    Schematic, based on the pattern reported in
  </text>
  <text x="730" y="60" font-size="12" font-style="italic" fill="#64748b" text-anchor="end">
    Liu et al. 2023 ('Lost in the Middle').
  </text>
</svg>
