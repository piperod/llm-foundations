title: LLM Foundations
description: >-
  A prerequisite curriculum on how large language models actually work —
  grounded in cited papers, for readers of agentic-dev.
theme: just-the-docs

url: "https://piperod.github.io"
baseurl: "/llm-foundations"

permalink: pretty
color_scheme: light
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "LLM Foundations on GitHub":
    - "https://github.com/piperod/llm-foundations"
  "agentic-dev (what comes next)":
    - "https://jonaprieto.github.io/agentic-dev/"
aux_links_new_tab: true

footer_content: >-
  Prerequisite curriculum for <a href="https://jonaprieto.github.io/agentic-dev/">agentic-dev</a>.
  Source on <a href="https://github.com/piperod/llm-foundations">GitHub</a>.

exclude:
  - notes/
  - presentation/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
